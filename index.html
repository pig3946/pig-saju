<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 사주 운세 — 피그의 일상정리</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; padding: 20px;
  display: flex; justify-content: center; align-items: flex-start;
}
.container {
  background: #fff; border-radius: 20px; padding: 32px;
  max-width: 500px; width: 100%; margin-top: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
h1 { font-size: 22px; text-align: center; margin-bottom: 8px; }
.subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }
.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 6px; color: #333; }
.input-row { display: flex; gap: 8px; }
select, input[type="number"] {
  flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px;
  font-size: 16px; outline: none; transition: border 0.2s;
}
select:focus, input:focus { border-color: #667eea; }
.btn {
  width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff; border: none; border-radius: 12px; font-size: 16px;
  font-weight: 700; cursor: pointer; margin-top: 12px; transition: transform 0.1s;
}
.btn:hover { transform: scale(1.02); }
.btn:active { transform: scale(0.98); }
.result { display: none; margin-top: 24px; }
.result-card {
  background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 12px;
}
.result-card h3 { font-size: 16px; margin-bottom: 8px; }
.result-card p { font-size: 14px; line-height: 1.8; color: #555; }
.highlight { background: #E8F5E9; border-left: 4px solid #43A047; padding: 12px 16px; border-radius: 0 8px 8px 0; margin: 12px 0; }
.blog-link {
  display: block; text-align: center; margin-top: 20px; padding: 12px;
  background: #03C75A; color: #fff; border-radius: 10px;
  text-decoration: none; font-weight: 700; font-size: 15px;
}
.footer { text-align: center; color: #aaa; font-size: 11px; margin-top: 16px; }
</style>
</head>
<body>
<div class="container">
  <h1>🔮 오늘의 사주 운세</h1>
  <p class="subtitle">생년월일을 입력하면 나만의 운세를 알려드려요</p>

  <div class="input-group">
    <label>📅 생년월일 (양력)</label>
    <div class="input-row">
      <input type="number" id="year" placeholder="년 (예: 1995)" min="1940" max="2025">
      <select id="month">
        <option value="">월</option>
        <script>for(let i=1;i<=12;i++) document.write(`<option value="${i}">${i}월</option>`)</script>
      </select>
      <select id="day">
        <option value="">일</option>
        <script>for(let i=1;i<=31;i++) document.write(`<option value="${i}">${i}일</option>`)</script>
      </select>
    </div>
  </div>

  <div class="input-group">
    <label>⏰ 태어난 시간 (선택)</label>
    <select id="hour" style="width:100%">
      <option value="-1">모르겠어요</option>
      <option value="0">자시 (23:00~01:00)</option>
      <option value="1">축시 (01:00~03:00)</option>
      <option value="2">인시 (03:00~05:00)</option>
      <option value="3">묘시 (05:00~07:00)</option>
      <option value="4">진시 (07:00~09:00)</option>
      <option value="5">사시 (09:00~11:00)</option>
      <option value="6">오시 (11:00~13:00)</option>
      <option value="7">미시 (13:00~15:00)</option>
      <option value="8">신시 (15:00~17:00)</option>
      <option value="9">유시 (17:00~19:00)</option>
      <option value="10">술시 (19:00~21:00)</option>
      <option value="11">해시 (21:00~23:00)</option>
    </select>
  </div>

  <button class="btn" onclick="calculate()">🔮 내 운세 보기</button>

  <div class="result" id="result">
    <div class="result-card">
      <h3>🐲 <span id="r-animal"></span></h3>
      <p id="r-animal-desc"></p>
    </div>
    <div class="result-card">
      <h3>🌿 오행: <span id="r-element"></span></h3>
      <p id="r-element-desc"></p>
    </div>
    <div class="result-card highlight">
      <h3>⭐ 오늘의 개인 운세</h3>
      <p id="r-fortune"></p>
    </div>
    <div class="result-card">
      <h3>💰 금전운</h3>
      <p id="r-money"></p>
    </div>
    <div class="result-card">
      <h3>💕 연애운</h3>
      <p id="r-love"></p>
    </div>
    <div class="result-card">
      <h3>🍀 럭키 포인트</h3>
      <p id="r-lucky"></p>
    </div>
    <a class="blog-link" href="https://blog.naver.com/pig_lifetime" target="_blank">
      📝 매일 운세 + 경제 정보 보러가기 →
    </a>
  </div>
  <p class="footer">© 피그의 일상정리 | 재미로 보는 운세예요 :)</p>
</div>

<script>
// 천간 (10개)
const CHEONGAN = ['갑','을','병','정','무','기','경','신','임','계'];
// 지지 (12개) + 띠
const JIJI = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
const ANIMALS = ['🐭 쥐띠','🐮 소띠','🐯 범띠','🐰 토끼띠','🐲 용띠','🐍 뱀띠',
                 '🐴 말띠','🐑 양띠','🐵 원숭이띠','🐓 닭띠','🐶 개띠','🐷 돼지띠'];
// 오행
const ELEMENTS = ['목(木)','화(火)','토(土)','금(金)','수(水)'];
const ELEMENT_COLORS = ['🌿 나무','🔥 불','⛰️ 흙','⚔️ 쇠','💧 물'];
const ELEMENT_DESC = [
  '창의적이고 성장 에너지가 강해요. 새로운 시작에 유리한 기운이에요.',
  '열정적이고 활동적인 에너지예요. 적극적으로 도전하면 좋은 결과가 따라요.',
  '안정적이고 중심을 잡는 에너지예요. 신뢰를 바탕으로 한 관계에서 빛나요.',
  '결단력과 실행력이 강한 에너지예요. 정리하고 마무리하는 데 탁월해요.',
  '지혜롭고 유연한 에너지예요. 상황에 맞게 적응하는 능력이 뛰어나요.'
];

// 오늘 날짜 기반 시드
const today = new Date();
const daySeed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();

function pseudoRandom(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function calculate() {
  const year = parseInt(document.getElementById('year').value);
  const month = parseInt(document.getElementById('month').value);
  const day = parseInt(document.getElementById('day').value);

  if (!year || !month || !day) { alert('생년월일을 입력해주세요!'); return; }

  // 띠 계산 (음력 기준 간략화: 양력 기준으로 대체)
  const animalIdx = (year - 4) % 12;
  const animal = ANIMALS[animalIdx];

  // 천간 → 오행 매핑
  const cheonganIdx = (year - 4) % 10;
  const elementIdx = Math.floor(cheonganIdx / 2);
  const element = ELEMENT_COLORS[elementIdx] + ' ' + ELEMENTS[elementIdx];

  // 개인 시드 (생년월일 + 오늘 날짜 조합)
  const personalSeed = daySeed + year * 100 + month * 31 + day;

  // 운세 문구 풀
  const fortunes = [
    '오늘은 새로운 기회가 찾아올 수 있어요. 열린 마음으로 받아들이세요.',
    '주변 사람들과의 소통이 행운을 가져다줄 거예요. 연락 한 통 해보세요.',
    '작은 변화가 큰 결과를 만들 수 있는 날이에요. 도전해보세요!',
    '차분하게 계획을 정리하면 좋은 성과가 따를 거예요.',
    '오래 미뤄둔 일을 처리하면 마음이 한결 가벼워질 거예요.',
    '예상치 못한 좋은 소식이 있을 수 있어요. 기대해보세요!',
    '금전적으로 신중한 판단이 필요한 날이에요. 큰 지출은 한 번 더 생각하세요.',
    '건강 관리에 신경 쓰면 좋은 날이에요. 가벼운 운동 추천!',
    '인간관계에서 따뜻한 말 한마디가 큰 힘이 될 거예요.',
    '창의적인 아이디어가 떠오를 수 있어요. 메모해두세요!',
    '오늘은 배움에 집중하면 좋겠어요. 새로운 정보가 도움이 될 거예요.',
    '과거의 노력이 결실을 맺기 시작하는 날이에요. 자신감을 가지세요!'
  ];

  const moneyFortunes = [
    '예상치 못한 소득이 있을 수 있어요. 하지만 충동 구매는 조심!',
    '투자보다는 저축에 집중하는 게 좋은 날이에요.',
    '가까운 사람과의 금전 거래는 피하는 게 좋겠어요.',
    '소소하지만 확실한 절약이 큰 도움이 될 거예요.',
    '재테크 관련 좋은 정보를 얻을 수 있는 날이에요.',
    '지출 계획을 세우면 한 달 살림이 편해질 거예요.'
  ];

  const loveFortunes = [
    '솔직한 마음 표현이 관계를 더 깊게 만들어줄 거예요.',
    '상대방의 작은 배려에 감사함을 표현해보세요.',
    '새로운 만남의 기회가 있을 수 있어요. 외출해보세요!',
    '연인과 함께 맛집 탐방하면 좋은 추억이 될 거예요.',
    '혼자만의 시간도 소중해요. 자기 돌봄에 집중하세요.',
    '오래된 친구에게 연락하면 좋은 에너지를 받을 수 있어요.'
  ];

  const luckyColors = ['레드','블루','그린','옐로우','퍼플','오렌지','핑크','화이트','브라운','민트'];
  const luckyNums = [1,2,3,4,5,6,7,8,9];

  // 시드 기반 선택
  const fIdx = Math.floor(pseudoRandom(personalSeed) * fortunes.length);
  const mIdx = Math.floor(pseudoRandom(personalSeed + 1) * moneyFortunes.length);
  const lIdx = Math.floor(pseudoRandom(personalSeed + 2) * loveFortunes.length);
  const cIdx = Math.floor(pseudoRandom(personalSeed + 3) * luckyColors.length);
  const nIdx = Math.floor(pseudoRandom(personalSeed + 4) * luckyNums.length);

  // 결과 표시
  document.getElementById('r-animal').textContent = animal + ` (${CHEONGAN[cheonganIdx]}${JIJI[animalIdx]}년)`;
  document.getElementById('r-animal-desc').textContent =
    `${year}년생, ${CHEONGAN[cheonganIdx]}${JIJI[animalIdx]}년이에요. ` +
    `오늘 ${animal.slice(2)}의 기운은 ${['안정적','활발','조용','역동적','평온'][elementIdx]}해요.`;
  document.getElementById('r-element').textContent = element;
  document.getElementById('r-element-desc').textContent = ELEMENT_DESC[elementIdx];
  document.getElementById('r-fortune').textContent = fortunes[fIdx];
  document.getElementById('r-money').textContent = moneyFortunes[mIdx];
  document.getElementById('r-love').textContent = loveFortunes[lIdx];
  document.getElementById('r-lucky').textContent =
    `럭키 컬러: ${luckyColors[cIdx]} | 럭키 숫자: ${luckyNums[nIdx]} | ` +
    `오늘의 방향: ${['동','서','남','북'][Math.floor(pseudoRandom(personalSeed+5)*4)]}`;

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
